services:
  aas-environment:
    container_name: aas-environment
    image: eclipsebasyx/aasenvironment-go:1.0.0-rc.2
    pull_policy: always
    ports:
      - '8082:8082'
    environment:
      - SERVER_PORT=8082
      - CORS_ALLOWEDORIGINS=*
      - CORS_ALLOWEDHEADERS=*
      - CORS_ALLOWEDCREDENTIALS=true
      - CORS_ALLOWEDMETHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=10
      - POSTGRES_MAXIDLECONNECTIONS=10
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - JWS_PRIVATEKEYPATH=/app/rsa-key.pem
      - ABAC_ENABLED=false
      - GENERAL_AASREGISTRYINTEGRATION=true
      - GENERAL_SUBMODELREGISTRYINTEGRATION=true
      - GENERAL_DISCOVERYINTEGRATION=true
      - GENERAL_EXTERNALURL=http://static.161.94.98.91.clients.your-server.de:8082
      - GENERAL_AAS_PRECONFIG_PATHS=/app/preconfiguration
    volumes:
      - ./basyx/rsa-key.pem:/app/rsa-key.pem:ro
      - ./aas:/app/preconfiguration:ro
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
    restart: unless-stopped
  db:
    container_name: postgres_db
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command:
      - postgres
      - '-c'
      - listen_addresses=*
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U admin -d basyxTestDB
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  basyx_configuration:
    container_name: basyx_configuration
    image: eclipsebasyx/basyxconfigurationservice-go:1.0.0-rc.2
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=10
      - POSTGRES_MAXIDLECONNECTIONS=10
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      db:
        condition: service_healthy
  aas-ui:
    container_name: aas-web-ui
    image: eclipsebasyx/aas-gui:v2-260526
    pull_policy: always
    ports:
      - '3000:3000'
    environment:
      ENDPOINT_CONFIG_AVAILABLE: 'false'
      ALLOW_EDITING: 'true'
      ALLOW_UPLOADING: 'true'
      ALLOW_LOGOUT: 'true'
      SM_VIEWER_EDITOR: 'true'
      START_PAGE_ROUTE_NAME: AASViewer
    volumes:
      - ./basyx-infra.yml:/basyx-infra.yml:ro
    depends_on:
      aas-environment:
        condition: service_started
    restart: unless-stopped
